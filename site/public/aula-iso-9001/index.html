<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aula ISO 9001 — Templum</title>

  <!-- ── REDIRECT IMEDIATO (antes do primeiro paint) ─────────────────────
       Só exibe a UI de administração se ?ver=1 estiver na URL.
       Para qualquer outro visitante o redirect acontece aqui, invisível.
  ──────────────────────────────────────────────────────────────────────── -->
  <script>
  (function() {
    var VARIANTS = [
      { id: 'a', path: '/aula-iso-9001-a/' },
      { id: 'b', path: '/aula-iso-9001-b/' },
      { id: 'c', path: '/aula-iso-9001-c/' },
      { id: 'd', path: '/aula-iso-9001-d/' },
    ];

    function lsGet(k, d) { try { var v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; } catch(e) { return d; } }
    function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

    // Verifica modo admin
    var isAdmin = /[?&]ver=1/.test(window.location.search);
    if (isAdmin) return; // deixa a página carregar normalmente

    // Round-robin
    var idx    = lsGet('ab_next', 0) % VARIANTS.length;
    var chosen = VARIANTS[idx];
    lsSet('ab_next', (idx + 1) % VARIANTS.length);
    lsSet('ab_cnt_' + chosen.id, lsGet('ab_cnt_' + chosen.id, 0) + 1);

    // Preserva query string (UTMs) mas remove ?ver= se existir
    var qs = window.location.search.replace(/[?&]ver=\d/g, '').replace(/^&/, '?');
    window.location.replace(chosen.path + qs);
  })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      padding: 40px 24px;
      text-align: center;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #FF5925;
      margin-bottom: 8px;
    }

    .admin-badge {
      display: inline-block;
      background: rgba(255,89,37,0.15);
      border: 1px solid #FF5925;
      color: #FF5925;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 28px;
    }

    /* ── Slot machine ── */
    .slot-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 32px;
      border-radius: 16px;
      border: 2px solid #222;
      overflow: hidden;
      background: #111;
    }

    .slot-track {
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
    }

    .slot-item {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      font-weight: 900;
      flex-shrink: 0;
      color: #fff;
    }
    .slot-item.winner { color: #FF5925; }

    .slot-wrap::before,
    .slot-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 28px;
      z-index: 2;
      pointer-events: none;
    }
    .slot-wrap::before { top: 0; background: linear-gradient(to bottom, #111, transparent); }
    .slot-wrap::after  { bottom: 0; background: linear-gradient(to top, #111, transparent); }

    /* ── Status ── */
    .status-line {
      font-size: 15px;
      color: #888;
      margin-bottom: 32px;
      min-height: 22px;
      transition: color 0.3s;
    }
    .status-line.ready { color: #FF5925; font-weight: 700; }

    /* ── Cards ── */
    .variants {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .v-card {
      background: #111;
      border: 1.5px solid #222;
      border-radius: 10px;
      padding: 12px 6px;
      transition: border-color 0.3s, background 0.3s, transform 0.2s;
      cursor: pointer;
      text-decoration: none;
    }
    .v-card:hover { border-color: #444; }

    .v-card.active {
      border-color: #FF5925;
      background: rgba(255,89,37,0.1);
      transform: scale(1.06);
    }

    .v-letter {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      display: block;
      margin-bottom: 4px;
    }
    .v-card.active .v-letter { color: #FF5925; }

    .v-count {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      display: block;
      margin-bottom: 2px;
    }

    .v-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: block;
    }

    /* ── Bar ── */
    .bar-row {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
      height: 4px;
      border-radius: 4px;
      overflow: hidden;
      background: #1a1a1a;
    }

    .bar-seg {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .bar-seg.seg-a { background: #FF5925; }
    .bar-seg.seg-b { background: #e0a800; }
    .bar-seg.seg-c { background: #25D366; }
    .bar-seg.seg-d { background: #4A90E2; }

    /* ── Legend ── */
    .legend {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-bottom: 24px;
    }
    .leg-item { font-size: 10px; color: #444; text-align: center; line-height: 1.4; }

    /* ── Reset link ── */
    .reset-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 11px;
      color: #333;
      cursor: pointer;
      text-decoration: underline;
    }
    .reset-link:hover { color: #666; }

    .foot { font-size: 11px; color: #2a2a2a; }

    /* ── Pulse ── */
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,89,37,0.5); }
      70%  { box-shadow: 0 0 0 12px rgba(255,89,37,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,89,37,0); }
    }
    .v-card.active { animation: pulse 0.9s ease-out; }
  </style>
</head>
<body>

<div class="wrap">

  <div class="logo">Templum · A/B Router</div>
  <span class="admin-badge">Modo Admin</span>

  <div class="slot-wrap">
    <div class="slot-track" id="slotTrack"></div>
  </div>

  <p class="status-line" id="statusLine">Sorteando próxima variante…</p>

  <div class="variants">
    <a class="v-card" id="card-a" href="/aula-iso-9001-a/">
      <span class="v-letter">A</span>
      <span class="v-count" id="cnt-a">0</span>
      <span class="v-label">visitas</span>
    </a>
    <a class="v-card" id="card-b" href="/aula-iso-9001-b/">
      <span class="v-letter">B</span>
      <span class="v-count" id="cnt-b">0</span>
      <span class="v-label">visitas</span>
    </a>
    <a class="v-card" id="card-c" href="/aula-iso-9001-c/">
      <span class="v-letter">C</span>
      <span class="v-count" id="cnt-c">0</span>
      <span class="v-label">visitas</span>
    </a>
    <a class="v-card" id="card-d" href="/aula-iso-9001-d/">
      <span class="v-letter">D</span>
      <span class="v-count" id="cnt-d">0</span>
      <span class="v-label">visitas</span>
    </a>
  </div>

  <div class="bar-row">
    <div class="bar-seg seg-a" id="bar-a" style="width:25%"></div>
    <div class="bar-seg seg-b" id="bar-b" style="width:25%"></div>
    <div class="bar-seg seg-c" id="bar-c" style="width:25%"></div>
    <div class="bar-seg seg-d" id="bar-d" style="width:25%"></div>
  </div>

  <div class="legend">
    <span class="leg-item">Pimenta<br>WPP direto</span>
    <span class="leg-item">Pimenta<br>Form</span>
    <span class="leg-item">Templum<br>WPP direto</span>
    <span class="leg-item">Templum<br>Form</span>
  </div>

  <span class="reset-link" id="resetBtn">↺ Zerar contadores</span>

  <br><br>
  <p class="foot">Leads não veem esta tela — são redirecionados instantaneamente</p>

</div>

<script>
(function() {
  var VARIANTS = [
    { id: 'a', path: '/aula-iso-9001-a/' },
    { id: 'b', path: '/aula-iso-9001-b/' },
    { id: 'c', path: '/aula-iso-9001-c/' },
    { id: 'd', path: '/aula-iso-9001-d/' },
  ];

  function lsGet(k, d) { try { var v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; } catch(e) { return d; } }
  function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

  // ── Qual variante seria sorteada AGORA (apenas preview, não incrementa) ──
  var previewIdx    = lsGet('ab_next', 0) % VARIANTS.length;
  var previewChosen = VARIANTS[previewIdx];

  // ── Atualiza contadores ─────────────────────────────────────────────────
  function updateCounters() {
    var total = 0;
    VARIANTS.forEach(function(v) { total += lsGet('ab_cnt_' + v.id, 0); });
    if (total === 0) total = 1;
    VARIANTS.forEach(function(v) {
      var cnt = lsGet('ab_cnt_' + v.id, 0);
      document.getElementById('cnt-' + v.id).textContent = cnt;
      document.getElementById('bar-' + v.id).style.width = (cnt / total * 100).toFixed(1) + '%';
    });
  }
  updateCounters();

  // ── Monta slot machine ──────────────────────────────────────────────────
  var track = document.getElementById('slotTrack');
  var labels = ['A','B','C','D'];
  var spinSeq = [];
  for (var i = 0; i < 12; i++) { spinSeq.push(labels[i % 4]); }
  spinSeq.push(previewChosen.id.toUpperCase()); // aterrissa na próxima variante

  spinSeq.forEach(function(lbl, idx) {
    var el = document.createElement('div');
    el.className = 'slot-item' + (idx === spinSeq.length - 1 ? ' winner' : '');
    el.textContent = lbl;
    track.appendChild(el);
  });

  // ── Animação ────────────────────────────────────────────────────────────
  var ITEM_H = 100, duration = 1100, startTs = null;
  var finalY = -((spinSeq.length - 1) * ITEM_H);

  function easeOutExpo(t) { return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t); }

  function animate(ts) {
    if (!startTs) startTs = ts;
    var p = Math.min((ts - startTs) / duration, 1);
    track.style.transform = 'translateY(' + (finalY * easeOutExpo(p)) + 'px)';
    if (p < 1) { requestAnimationFrame(animate); }
    else        { onDone(); }
  }
  requestAnimationFrame(animate);

  function onDone() {
    document.getElementById('card-' + previewChosen.id).classList.add('active');
    var s = document.getElementById('statusLine');
    s.textContent = 'Próximo visitante → Variante ' + previewChosen.id.toUpperCase();
    s.classList.add('ready');
  }

  // ── Zerar contadores ────────────────────────────────────────────────────
  document.getElementById('resetBtn').addEventListener('click', function() {
    if (!confirm('Zerar todos os contadores?')) return;
    VARIANTS.forEach(function(v) { lsSet('ab_cnt_' + v.id, 0); });
    lsSet('ab_next', 0);
    updateCounters();
    VARIANTS.forEach(function(v) { document.getElementById('card-' + v.id).classList.remove('active'); });
    document.getElementById('statusLine').textContent = 'Contadores zerados.';
    document.getElementById('statusLine').classList.remove('ready');
  });
})();
</script>

</body>
</html>

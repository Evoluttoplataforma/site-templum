# Cloudflare Workers — deploy de site estático (static assets).
# O build do Astro gera ./dist; o Worker serve esses arquivos.
# IMPORTANTE: o `name` abaixo deve ser IGUAL ao nome do seu Worker no painel.
name = "site-templum"
main = "worker.js"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
# serve /404.html em rotas não encontradas (quando a página 404 existir)
not_found_handling = "404-page"

# Variáveis NÃO-sensíveis (ficam aqui p/ não sumir nos deploys via Git).
# Valores sensíveis (tokens/chaves) NÃO entram aqui — são Secrets no painel:
#   MAILCHIMP_API_KEY, META_CAPI_TOKEN, META_CAPI_TOKEN_2
# Remova os META_TEST_EVENT_CODE* após validar (p/ contar conversão real).
[vars]
META_PIXEL_ID = "4177249519256900"
META_PIXEL_ID_2 = "953370546204625"
META_TEST_EVENT_CODE = "TEST5322"
META_TEST_EVENT_CODE_2 = "TEST5239"

# Logs no Workers (runtime) — p/ depurar /api/lead e /api/track (CAPI/Mailchimp).
[observability.logs]
enabled = true
invocation_logs = true

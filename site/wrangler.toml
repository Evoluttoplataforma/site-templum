# Cloudflare Workers — deploy de site estático (static assets).
# O build do Astro gera ./dist; o Worker serve esses arquivos.
# IMPORTANTE: o `name` abaixo deve ser IGUAL ao nome do seu Worker no painel.
name = "site-templum"
main = "worker.js"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
# serve /404.html em rotas não encontradas (quando a página 404 existir)
not_found_handling = "404-page"

# Todas as variáveis/secrets do Worker são definidas no painel
# (Settings → Variables and Secrets) como SECRET — assim persistem entre deploys
# e não conflitam com o wrangler.toml:
#   META_PIXEL_ID, META_PIXEL_ID_2, META_TEST_EVENT_CODE, META_TEST_EVENT_CODE_2,
#   META_CAPI_TOKEN, META_CAPI_TOKEN_2, MAILCHIMP_API_KEY, MAILCHIMP_LIST_ID

# Logs no Workers (runtime) — p/ depurar /api/lead e /api/track (CAPI/Mailchimp).
[observability.logs]
enabled = true
invocation_logs = true
